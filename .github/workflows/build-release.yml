name: Production Rollout and Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.0.58)'
        required: true
        type: string
      staging_run_id:
        description: 'Approved Staging Workflow Run ID'
        required: true
        type: string

concurrency:
  group: release-production-group
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  manual-desktop-dry-run:
    name: Build Desktop Artifacts Without Publishing
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run dist:win

  tag-release-validation:
    name: Validate Tag Release Contract
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Verify Tag and Version Sources
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const tag = process.env.RELEASE_TAG;
          if (!/^v(?:0|[1-9]\d*)\.(?:0|[1-9]\d*)\.(?:0|[1-9]\d*)$/.test(tag)) {
            throw new Error(`Invalid stable release tag: ${tag}`);
          }
          const version = tag.slice(1);
          for (const file of ['package.json', 'package-lock.json', 'public/version.json', 'public/release-notes.json']) {
            const value = JSON.parse(fs.readFileSync(file, 'utf8')).version;
            if (value !== version) throw new Error(`${file} version ${value} does not match tag ${tag}`);
          }
          console.log(`Validated release tag ${tag} against all version sources.`);
          NODE
      - run: npm run test:secret-leaks
      - run: npm run test:workflow-rules
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run i18n:check
      - run: npm run test:database-compatibility
      - run: npm run test:database-contracts
      - run: npm run test:updater
      - run: npm run test:release-version

  tag-build-desktop:
    name: Build Tag Windows Updater Assets
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: tag-release-validation
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run dist:win
      - name: Require Complete Updater Asset Set
        shell: pwsh
        run: |
          $minimumSizes = @{
            'release/MyDesck-PRO-Setup.exe' = 1048576
            'release/MyDesck-PRO-Setup.exe.blockmap' = 1024
            'release/latest.yml' = 64
          }
          foreach ($entry in $minimumSizes.GetEnumerator()) {
            if (-not (Test-Path -LiteralPath $entry.Key -PathType Leaf)) {
              throw "Missing required release asset: $($entry.Key)"
            }
            if ((Get-Item -LiteralPath $entry.Key).Length -lt $entry.Value) {
              throw "Release asset is unexpectedly small: $($entry.Key)"
            }
          }
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-tag-candidate
          if-no-files-found: error
          retention-days: 7
          path: |
            release/MyDesck-PRO-Setup.exe
            release/MyDesck-PRO-Setup.exe.blockmap
            release/latest.yml

  tag-verify-desktop-assets:
    name: Verify Tag Updater Assets
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: tag-build-desktop
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: desktop-tag-candidate
          path: release
      - run: node scripts/verify-desktop-release-assets.mjs
      - run: node scripts/verify-desktop-updater-metadata.mjs
      - name: Verify latest.yml Installer SHA-512
        run: |
          node --input-type=module - <<'NODE'
          import fs from 'node:fs';
          import crypto from 'node:crypto';
          import yaml from 'js-yaml';
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const metadata = yaml.load(fs.readFileSync('release/latest.yml', 'utf8'));
          const expectedName = 'MyDesck-PRO-Setup.exe';
          if (metadata.version !== pkg.version) throw new Error('latest.yml version mismatch');
          if (metadata.path !== expectedName) throw new Error('latest.yml installer filename mismatch');
          const expectedSha512 = metadata.sha512 || metadata.files?.find((file) => file.url === expectedName)?.sha512;
          if (!expectedSha512) throw new Error('latest.yml SHA-512 is missing');
          const actualSha512 = crypto.createHash('sha512').update(fs.readFileSync(`release/${expectedName}`)).digest('base64');
          if (actualSha512 !== expectedSha512) throw new Error('Installer SHA-512 does not match latest.yml');
          console.log('Installer SHA-512 matches latest.yml.');
          NODE
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-tag-verified
          if-no-files-found: error
          retention-days: 7
          path: |
            release/MyDesck-PRO-Setup.exe
            release/MyDesck-PRO-Setup.exe.blockmap
            release/latest.yml

  publish-desktop-release:
    name: Publish Tag GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: tag-verify-desktop-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/download-artifact@v4
        with:
          name: desktop-tag-verified
          path: release
      - name: Generate Release Notes
        run: node scripts/generate-release-notes-md.mjs
      - name: Reject Duplicate Tags and Releases
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          if git ls-remote --exit-code origin "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "Alternate non-v tag already exists: $VERSION"
            exit 1
          fi
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1 || gh release view "$VERSION" >/dev/null 2>&1; then
            echo "A release already exists for version $VERSION"
            exit 1
          fi
      - name: Publish Complete GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release create "$RELEASE_TAG" \
            release/MyDesck-PRO-Setup.exe \
            release/MyDesck-PRO-Setup.exe.blockmap \
            release/latest.yml \
            --verify-tag \
            --title "MyDesck PRO $RELEASE_TAG" \
            --notes-file release-notes.md

  verify-staging-run:
    name: 1. Query GitHub API & Verify Tamper-Resistant Staging Evidence
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Verify Strict Main Branch Ref
        shell: bash
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "❌ CRITICAL SECURITY RULE: Production releases are permitted ONLY on 'refs/heads/main'. Current ref: ${{ github.ref }}"
            exit 1
          fi

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci

      - name: Query GitHub API for Staging Run Details & Download Evidence
        env:
          GITHUB_TOKEN: ${{ github.token }}
          STAGING_RUN_ID: ${{ github.event.inputs.staging_run_id }}
          CURRENT_SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          node -e "
            const fs = require('fs');
            const { execSync } = require('child_process');
            const runId = process.env.STAGING_RUN_ID;
            const repo = process.env.REPOSITORY;
            const token = process.env.GITHUB_TOKEN;
            const currentSha = process.env.CURRENT_SHA;

            console.log('Querying GitHub API for workflow run:', runId);
            const curlCmd = \`curl -s -H "Authorization: Bearer \${token}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/\${repo}/actions/runs/\${runId}"\`;
            const runJson = JSON.parse(execSync(curlCmd, { encoding: 'utf8' }));

            if (!runJson || runJson.message) {
              console.error('❌ Failed to fetch staging workflow run from GitHub API:', runJson.message || 'Run not found');
              process.exit(1);
            }

            console.log('Staging Run Conclusion:', runJson.conclusion);
            console.log('Staging Run Head SHA:  ', runJson.head_sha);
            console.log('Staging Run Branch:    ', runJson.head_branch);

            if (runJson.conclusion !== 'success') {
              console.error('❌ Staging run conclusion is not success! Status:', runJson.conclusion);
              process.exit(1);
            }

            if (runJson.head_sha !== currentSha) {
              console.error('❌ Mismatched commit SHA! Target main SHA (' + currentSha + ') does not match staging run head SHA (' + runJson.head_sha + ')');
              process.exit(1);
            }

            if (!runJson.head_branch.startsWith('release/staging-')) {
              console.error('❌ Invalid staging branch:', runJson.head_branch);
              process.exit(1);
            }

            console.log('✓ Staging Workflow Run API verification passed.');
          "

      - uses: actions/download-artifact@v4
        with:
          name: staging-evidence
          run-id: ${{ github.event.inputs.staging_run_id }}
          github-token: ${{ github.token }}
          path: .

      - name: Validate All 17 Required Evidence Fields (Fail Closed)
        env:
          CURRENT_SHA: ${{ github.sha }}
          VERSION_INPUT: ${{ github.event.inputs.version }}
        run: |
          node -e "
            const fs = require('fs');
            const evidence = JSON.parse(fs.readFileSync('staging-evidence.json', 'utf8'));
            const requiredFields = [
              'schema_version', 'commit_sha', 'workflow_run_id', 'workflow_attempt',
              'repository', 'workflow_file', 'candidate_version', 'vercel_staging_url',
              'staging_database_host', 'database_verification_status', 'playwright_e2e_status',
              'updater_test_status', 'installer_sha256', 'blockmap_sha256', 'latest_yml_sha256',
              'timestamp', 'expiration_timestamp'
            ];

            for (const field of requiredFields) {
              if (!evidence[field] || typeof evidence[field] !== 'string' || evidence[field].trim() === '') {
                console.error('❌ FAIL CLOSED: Missing or empty required evidence field:', field);
                process.exit(1);
              }
            }

            if (evidence.commit_sha !== process.env.CURRENT_SHA) {
              console.error('❌ Evidence commit SHA mismatch!');
              process.exit(1);
            }

            if (evidence.candidate_version !== process.env.VERSION_INPUT) {
              console.error('❌ Evidence candidate version (' + evidence.candidate_version + ') does not match workflow version input (' + process.env.VERSION_INPUT + ')');
              process.exit(1);
            }

            if (new Date(evidence.expiration_timestamp).getTime() < Date.now()) {
              console.error('❌ Evidence artifact has expired!');
              process.exit(1);
            }

            console.log('✓ All 17 required evidence fields validated successfully.');
          "

  production-approval:
    name: 2. Protected GitHub Environment Manual Approval
    needs: verify-staging-run
    environment:
      name: production
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Manual Authorization Granted
        run: echo "✓ Protected manual environment approval granted BEFORE any production mutation."

  production-preflight-and-backup:
    name: 3. Production Database Safety & Backup Verification
    needs: production-approval
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Verify Production Database Host & Backup Capability
        env:
          PROD_DB_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          if [ -z "$PROD_DB_URL" ]; then
            echo "❌ Missing PROD_DATABASE_URL secret"
            exit 1
          fi
          node -e "
            const url = require('url');
            const parsed = new url.URL(process.env.PROD_DB_URL);
            if (parsed.hostname.includes('staging')) {
              console.error('❌ FATAL: Production database connection points to staging host!');
              process.exit(1);
            }
            console.log('✓ Target Production Database Host Verified:', parsed.hostname);
          "

  production-database-migration:
    name: 4. Production Database Migration (Database-First)
    needs: production-preflight-and-backup
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Push Database Migrations to Production Supabase
        env:
          SUPABASE_DB_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: npx supabase db push --db-url "${{ secrets.PROD_DATABASE_URL }}"

  production-database-contract-verification:
    name: 5. Verify Production Live RPC & Database Catalog Contracts
    needs: production-database-migration
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Verify Production Database Contracts
        env:
          APP_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: node scripts/check-database-compatibility.mjs

  production-vercel-deployment:
    name: 6. Deploy Production Vercel Application
    needs: production-database-contract-verification
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      prod_url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel Production Environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build Vercel Production Artifacts
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy Production Application to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          PROD_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$PROD_URL" >> $GITHUB_OUTPUT

  production-web-smoke-tests:
    name: 7. Production Web Smoke Tests
    needs: production-vercel-deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Verify Production Web Response
        shell: bash
        run: |
          URL="${{ needs.production-vercel-deployment.outputs.prod_url }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          if [ "$STATUS" -ne 200 ]; then
            echo "❌ Production website returned HTTP $STATUS (expected 200)"
            exit 1
          fi
          echo "✓ Production website live and healthy: $URL"

  dispatch-publish-desktop-release:
    name: 8. Publish Exact Pre-Verified Desktop Release Artifacts
    needs: production-web-smoke-tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: desktop-candidate
          run-id: ${{ github.event.inputs.staging_run_id }}
          github-token: ${{ github.token }}
          path: release
      - uses: actions/download-artifact@v4
        with:
          name: staging-evidence
          run-id: ${{ github.event.inputs.staging_run_id }}
          github-token: ${{ github.token }}
          path: .
      - name: Generate Clean Markdown Release Notes
        run: node scripts/generate-release-notes-md.mjs
      - name: Verify Tag Does Not Exist & Installer, Blockmap, latest.yml Hashes
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "❌ Tag $TAG already exists locally!"
            exit 1
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "❌ GitHub release $TAG already exists!"
            exit 1
          fi

          node -e "
            const fs = require('fs');
            const crypto = require('crypto');
            const evidence = JSON.parse(fs.readFileSync('staging-evidence.json', 'utf8'));
            
            function hashFile(path) {
              return crypto.createHash('sha256').update(fs.readFileSync(path)).digest('hex');
            }

            const files = fs.readdirSync('release');
            const setupFile = files.find(f => f.endsWith('.exe'));
            const blockmapFile = files.find(f => f.endsWith('.exe.blockmap'));
            const latestFile = files.find(f => f === 'latest.yml');

            if (!setupFile || !blockmapFile || !latestFile) {
              throw new Error('❌ Missing required installer, blockmap, or latest.yml file in release directory');
            }

            const currentSetupHash = hashFile('release/' + setupFile);
            const currentBlockmapHash = hashFile('release/' + blockmapFile);
            const currentLatestHash = hashFile('release/' + latestFile);

            console.log('Evidence Setup SHA256:   ', evidence.installer_sha256);
            console.log('Candidate Setup SHA256:  ', currentSetupHash);
            console.log('Evidence Blockmap SHA256:', evidence.blockmap_sha256);
            console.log('Candidate Blockmap SHA256:', currentBlockmapHash);
            console.log('Evidence latest.yml SHA: ', evidence.latest_yml_sha256);
            console.log('Candidate latest.yml SHA:', currentLatestHash);

            if (currentSetupHash !== evidence.installer_sha256 ||
                currentBlockmapHash !== evidence.blockmap_sha256 ||
                currentLatestHash !== evidence.latest_yml_sha256) {
              throw new Error('❌ ARTIFACT INTEGRITY VIOLATION: Candidate byte hashes do not match verified staging evidence!');
            }
            console.log('✓ All three artifact byte hashes match verified staging evidence.');
          "

      - name: Tag Commit and Create GitHub Release (Fail Closed on Error)
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          TAG="v$VERSION"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" release/* --title "MyDesck PRO $TAG" --notes-file release-notes.md

  production-updater-verification:
    name: 9. Verify Public GitHub Release Assets & Hash Parity
    needs: dispatch-publish-desktop-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: staging-evidence
          run-id: ${{ github.event.inputs.staging_run_id }}
          github-token: ${{ github.token }}
          path: .
      - name: Download Published GitHub Release Assets & Verify Hashes
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          TAG="v$VERSION"
          mkdir -p downloaded_assets
          gh release download "$TAG" --dir downloaded_assets

          node -e "
            const fs = require('fs');
            const crypto = require('crypto');
            const evidence = JSON.parse(fs.readFileSync('staging-evidence.json', 'utf8'));

            const files = fs.readdirSync('downloaded_assets');
            const setupFile = files.find(f => f.endsWith('.exe'));
            if (!setupFile) throw new Error('❌ Downloaded release assets missing .exe installer');

            const downloadedHash = crypto.createHash('sha256').update(fs.readFileSync('downloaded_assets/' + setupFile)).digest('hex');
            console.log('Verified Candidate SHA256: ', evidence.installer_sha256);
            console.log('Downloaded Release SHA256: ', downloadedHash);

            if (downloadedHash !== evidence.installer_sha256) {
              throw new Error('❌ PUBLIC ASSET INTEGRITY VIOLATION: Downloaded release asset hash does not match verified staging evidence!');
            }
            console.log('✓ Published GitHub release asset byte parity verified.');
          "

  release-completion:
    name: 10. Mark Production Release Complete
    needs: production-updater-verification
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Release Pipeline Final Summary
        run: echo "🎉 MyDesck PRO Production Release Complete, Verified, and Published."

name: Production Rollout and Release Pipeline

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.0.58)'
        required: true
        type: string

concurrency:
  group: release-production-group
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify-staging-evidence:
    name: 1. Verify Staging Evidence & Main Branch Rule
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Verify Strict Main Branch Ref
        shell: bash
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "❌ CRITICAL SECURITY RULE: Production releases are permitted ONLY on 'refs/heads/main'. Current ref: ${{ github.ref }}"
            exit 1
          fi

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: staging-evidence
          path: .
      - name: Validate Staging Evidence Binding
        env:
          CURRENT_SHA: ${{ github.sha }}
        run: |
          node -e "
            const fs = require('fs');
            const evidence = JSON.parse(fs.readFileSync('staging-evidence.json', 'utf8'));
            const currentSha = process.env.CURRENT_SHA;
            console.log('Staging Evidence SHA:', evidence.commit_sha);
            console.log('Production Target SHA:', currentSha);
            if (evidence.commit_sha !== currentSha) {
              console.error('❌ Mismatched commit SHA! Production target commit SHA does not match verified staging evidence.');
              process.exit(1);
            }
            if (evidence.status !== 'STAGING PASS') {
              console.error('❌ Staging evidence status is not STAGING PASS');
              process.exit(1);
            }
            console.log('✓ Verified Staging Evidence matching exact commit SHA.');
          "

  production-database-migration:
    name: 2. Production Database Migration (Database-First)
    needs: verify-staging-evidence
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Push Database Migrations to Production Supabase
        env:
          SUPABASE_DB_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: npx supabase db push --db-url "${{ secrets.PROD_DATABASE_URL }}"

  production-database-contract-verification:
    name: 3. Verify Production RPC & Database Schema Contracts
    needs: production-database-migration
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Verify Production Schema Contracts
        env:
          APP_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: node scripts/check-database-compatibility.mjs

  production-vercel-deployment:
    name: 4. Deploy Production Vercel Application
    needs: production-database-contract-verification
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      prod_url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel Production Environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build Vercel Production Artifacts
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy Production Application to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          PROD_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$PROD_URL" >> $GITHUB_OUTPUT

  production-web-smoke-tests:
    name: 5. Production Web Smoke Tests
    needs: production-vercel-deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Verify Production Web Response
        shell: bash
        run: |
          URL="${{ needs.production-vercel-deployment.outputs.prod_url }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          if [ "$STATUS" -ne 200 ]; then
            echo "❌ Production website returned HTTP $STATUS (expected 200)"
            exit 1
          fi
          echo "✓ Production website live and healthy: $URL"

  production-approval:
    name: 6. Protected GitHub Environment Manual Approval
    needs: production-web-smoke-tests
    environment:
      name: production
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Manual Release Authorization Verified
        run: echo "✓ Manual approval granted by required reviewer in production environment."

  publish-desktop-release:
    name: 7. Publish Exact Pre-Verified Desktop Release Artifacts
    needs: production-approval
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - uses: actions/download-artifact@v4
        with:
          name: desktop-candidate
          path: release
      - uses: actions/download-artifact@v4
        with:
          name: staging-evidence
          path: .
      - name: Verify Exact Artifact Bytes (No Rebuilding!)
        run: |
          npm run test:desktop-assets
          node -e "
            const fs = require('fs');
            const crypto = require('crypto');
            const evidence = JSON.parse(fs.readFileSync('staging-evidence.json', 'utf8'));
            const files = fs.readdirSync('release').filter(f => f.endsWith('.exe'));
            if (files.length === 0) throw new Error('No setup installer found in candidate release');
            const installerPath = 'release/' + files[0];
            const currentHash = crypto.createHash('sha256').update(fs.readFileSync(installerPath)).digest('hex');
            console.log('Verified Candidate SHA256:', evidence.installer_sha256);
            console.log('Publish Target SHA256:   ', currentHash);
            if (evidence.installer_sha256 && currentHash !== evidence.installer_sha256) {
              throw new Error('❌ ARTIFACT INTEGRITY VIOLATION: Publish installer byte hash does not match verified candidate!');
            }
            console.log('✓ Exact byte hash match verified. Publishing exact verified candidate installer.');
          "
      - name: Tag and Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          VERSION="v$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json')).version)")"
          echo "Publishing release $VERSION..."
          gh release create "$VERSION" release/* --title "MyDesck PRO $VERSION" --notes-file public/release-notes.json || true

  production-updater-verification:
    name: 8. Verify Production Desktop Updater Feed
    needs: publish-desktop-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Verify Live GitHub Desktop Feed
        run: node scripts/verify-desktop-release-assets.mjs

  release-completion:
    name: 9. Mark Production Release Complete
    needs: production-updater-verification
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Release Pipeline Final Summary
        run: echo "🎉 MyDesck PRO Production Release Complete and Verified."

name: Staging Candidate Pipeline

on:
  push:
    branches:
      - 'release/staging-*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  static-gate:
    name: 1. Static Contract & Code Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run test:release-static

  staging-preflight:
    name: 2. Staging Configuration & Feed Preflight
    needs: static-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Validate Staging Secrets & Updater Feed URL
        env:
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          STAGING_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          STAGING_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          STAGING_USER_A_EMAIL: ${{ secrets.STAGING_USER_A_EMAIL }}
          STAGING_USER_A_PASSWORD: ${{ secrets.STAGING_USER_A_PASSWORD }}
          STAGING_USER_B_EMAIL: ${{ secrets.STAGING_USER_B_EMAIL }}
          STAGING_USER_B_PASSWORD: ${{ secrets.STAGING_USER_B_PASSWORD }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          STAGING_UPDATER_FEED_URL: ${{ secrets.STAGING_UPDATER_FEED_URL }}
        shell: bash
        run: |
          MISSING=()
          [ -z "$STAGING_SUPABASE_URL" ] && MISSING+=("STAGING_SUPABASE_URL")
          [ -z "$STAGING_SUPABASE_ANON_KEY" ] && MISSING+=("STAGING_SUPABASE_ANON_KEY")
          [ -z "$STAGING_SUPABASE_SERVICE_ROLE_KEY" ] && MISSING+=("STAGING_SUPABASE_SERVICE_ROLE_KEY")
          [ -z "$STAGING_DATABASE_URL" ] && MISSING+=("STAGING_DATABASE_URL")
          [ -z "$STAGING_USER_A_EMAIL" ] && MISSING+=("STAGING_USER_A_EMAIL")
          [ -z "$STAGING_USER_A_PASSWORD" ] && MISSING+=("STAGING_USER_A_PASSWORD")
          [ -z "$STAGING_USER_B_EMAIL" ] && MISSING+=("STAGING_USER_B_EMAIL")
          [ -z "$STAGING_USER_B_PASSWORD" ] && MISSING+=("STAGING_USER_B_PASSWORD")
          [ -z "$VERCEL_TOKEN" ] && MISSING+=("VERCEL_TOKEN")
          [ -z "$VERCEL_ORG_ID" ] && MISSING+=("VERCEL_ORG_ID")
          [ -z "$VERCEL_PROJECT_ID" ] && MISSING+=("VERCEL_PROJECT_ID")
          [ -z "$STAGING_UPDATER_FEED_URL" ] && MISSING+=("STAGING_UPDATER_FEED_URL")

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "❌ Missing required staging configuration secrets:"
            for key in "${MISSING[@]}"; do
              echo "  - $key"
            done
            exit 1
          fi

          node -e "
            const feedUrl = process.env.STAGING_UPDATER_FEED_URL;
            if (!feedUrl.startsWith('https://')) {
              console.error('❌ STAGING_UPDATER_FEED_URL must be a secure HTTPS URL');
              process.exit(1);
            }
            if (feedUrl.includes('github.com/Aseel-V/MyDesck-PRO-Releases') || feedUrl.includes('mydesck.app')) {
              console.error('❌ STAGING_UPDATER_FEED_URL must NOT point to production GitHub Release or production website feed!');
              process.exit(1);
            }
            console.log('✓ Isolated Staging Updater Feed URL validated.');
          "

  check-runner-health:
    name: 3. Verify Self-Hosted Windows Upgrade Runner Health
    needs: staging-preflight
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Query GitHub API for Self-Hosted Windows Upgrade Runner
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          node -e "
            const { execSync } = require('child_process');
            const repo = process.env.REPOSITORY;
            const token = process.env.GITHUB_TOKEN;
            const curlCmd = \`curl -s -H "Authorization: Bearer \${token}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/\${repo}/actions/runners"\`;
            const res = JSON.parse(execSync(curlCmd, { encoding: 'utf8' }));
            
            const runners = res.runners || [];
            const upgradeRunner = runners.find(r => 
              r.status === 'online' && 
              r.os === 'Windows' && 
              r.labels && r.labels.some(l => l.name === 'mydesck-upgrade-test')
            );

            if (!upgradeRunner) {
              console.log('DESKTOP UPGRADE RUNNER: BLOCKED');
              console.error('❌ FAIL CLOSED: No online self-hosted Windows runner with label [mydesck-upgrade-test] is currently active for repo ' + repo);
              process.exit(1);
            }

            console.log('✓ Online self-hosted Windows runner detected:', upgradeRunner.name);
          "

  staging-database-migration:
    name: 4. Apply Staging Database Migrations
    needs: check-runner-health
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Verify APP_ENV=staging and Reject Production Project
        env:
          APP_ENV: staging
          STAGING_URL: ${{ secrets.STAGING_SUPABASE_URL }}
        run: |
          node -e "
            const url = require('url');
            if (process.env.APP_ENV !== 'staging') process.exit(1);
            const parsed = new url.URL(process.env.STAGING_URL);
            if (parsed.hostname.includes('pubugnfaqqukelvgckdr')) {
              console.error('❌ FATAL: Staging target matches production project reference!');
              process.exit(1);
            }
          "
      - name: Push Migrations to Staging Database
        env:
          SUPABASE_DB_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: npx supabase db push --db-url "${{ secrets.STAGING_DATABASE_URL }}"

  staging-database-contract-verification:
    name: 5. Verify Live Staging Database Contracts
    needs: staging-database-migration
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Verify Staging Database
        env:
          APP_ENV: staging
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          STAGING_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: npm run test:staging-db
      - name: Validate Staging Database Result File with Shared Validator
        env:
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: node scripts/validate-result-schema.mjs results/staging-database-result.json staging-database
      - uses: actions/upload-artifact@v4
        with:
          name: staging-database-result
          path: results/staging-database-result.json

  deploy-staging:
    name: 6. Real Vercel Staging Deployment
    needs: check-runner-health
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      staging_url: ${{ steps.deploy.outputs.url }}
      deployment_id: ${{ steps.deploy.outputs.deployment_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel Preview Environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build Vercel Preview Artifacts
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy Prebuilt Artifacts to Vercel Staging
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "deployment_id=$(echo $DEPLOY_URL | cut -d'.' -f1 | cut -d'/' -f3)" >> $GITHUB_OUTPUT
      - name: Verify Staging URL HTTP 200 Response
        shell: bash
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          if [ "$STATUS" -ne 200 ]; then
            echo "❌ Vercel staging deployment returned HTTP $STATUS (expected 200)"
            exit 1
          fi
          echo "✓ Vercel staging URL returned HTTP 200"

  staging-e2e:
    name: 7. Playwright Browser E2E Staging Suite
    needs:
      - deploy-staging
      - staging-database-contract-verification
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E Staging Suite
        env:
          STAGING_APP_URL: ${{ needs.deploy-staging.outputs.staging_url }}
          STAGING_USER_A_EMAIL: ${{ secrets.STAGING_USER_A_EMAIL }}
          STAGING_USER_A_PASSWORD: ${{ secrets.STAGING_USER_A_PASSWORD }}
          STAGING_USER_B_EMAIL: ${{ secrets.STAGING_USER_B_EMAIL }}
          STAGING_USER_B_PASSWORD: ${{ secrets.STAGING_USER_B_PASSWORD }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: npm run test:staging-e2e
      - name: Validate Playwright Result File with Shared Validator
        env:
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: node scripts/validate-result-schema.mjs results/playwright-result.json playwright
      - uses: actions/upload-artifact@v4
        with:
          name: playwright-result
          path: results/playwright-result.json

  build-desktop-candidate:
    name: 8. Build Unsigned Desktop Candidate Installer
    needs: staging-e2e
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Build Candidate Setup Installer
        env:
          VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
        run: npm run dist:win
      - name: Upload Candidate Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-candidate
          path: release/*

  verify-desktop-candidate:
    name: 9. Verify Built Candidate Installer & Compute Hashes
    needs: build-desktop-candidate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      installer_sha256: ${{ steps.hash.outputs.installer_sha256 }}
      blockmap_sha256: ${{ steps.hash.outputs.blockmap_sha256 }}
      latest_yml_sha256: ${{ steps.hash.outputs.latest_yml_sha256 }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - uses: actions/download-artifact@v4
        with:
          name: desktop-candidate
          path: release
      - name: Verify Candidate Assets & Hashes
        id: hash
        env:
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          npm run test:desktop-assets
          INSTALLER_HASH=$(sha256sum release/MyDesck-PRO-Setup-*.exe | awk '{print $1}')
          BLOCKMAP_HASH=$(sha256sum release/MyDesck-PRO-Setup-*.exe.blockmap | awk '{print $1}')
          LATEST_HASH=$(sha256sum release/latest.yml | awk '{print $1}')
          
          echo "installer_sha256=$INSTALLER_HASH" >> $GITHUB_OUTPUT
          echo "blockmap_sha256=$BLOCKMAP_HASH" >> $GITHUB_OUTPUT
          echo "latest_yml_sha256=$LATEST_HASH" >> $GITHUB_OUTPUT
      - name: Validate Artifact Integrity Result File with Shared Validator
        env:
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: node scripts/validate-result-schema.mjs results/artifact-integrity-result.json artifact-integrity
      - uses: actions/upload-artifact@v4
        with:
          name: artifact-integrity-result
          path: results/artifact-integrity-result.json

  staging-updater-metadata:
    name: 10. Staged Desktop Updater Channel Metadata Verification
    needs: verify-desktop-candidate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - uses: actions/download-artifact@v4
        with:
          name: desktop-candidate
          path: release
      - run: npm ci
      - name: Verify Metadata Contract
        env:
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: npm run test:desktop-updater-metadata
      - name: Validate Updater Metadata Result File with Shared Validator
        env:
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: node scripts/validate-result-schema.mjs results/updater-metadata-result.json desktop-updater-metadata
      - uses: actions/upload-artifact@v4
        with:
          name: updater-metadata-result
          path: results/updater-metadata-result.json

  staging-upgrade-test:
    name: 11. Physical Windows Previous-Version Upgrade Harness Test
    needs: staging-updater-metadata
    runs-on:
      - self-hosted
      - windows
      - mydesck-upgrade-test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - uses: actions/download-artifact@v4
        with:
          name: desktop-candidate
          path: release
      - run: npm ci
      - name: Execute Observed Windows Upgrade Harness
        env:
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          STAGING_UPDATER_FEED_URL: ${{ secrets.STAGING_UPDATER_FEED_URL }}
        run: node scripts/run-windows-upgrade-harness.mjs
      - name: Validate Desktop Upgrade Result File with Shared Validator
        env:
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: node scripts/validate-result-schema.mjs results/desktop-upgrade-result.json desktop-upgrade
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-upgrade-result
          path: results/desktop-upgrade-result.json

  generate-staging-evidence:
    name: 12. Aggregate Machine-Readable Job Results & Generate Evidence
    needs:
      - deploy-staging
      - staging-e2e
      - staging-upgrade-test
      - verify-desktop-candidate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - uses: actions/download-artifact@v4
        with:
          name: staging-database-result
          path: results
      - uses: actions/download-artifact@v4
        with:
          name: playwright-result
          path: results
      - uses: actions/download-artifact@v4
        with:
          name: artifact-integrity-result
          path: results
      - uses: actions/download-artifact@v4
        with:
          name: updater-metadata-result
          path: results
      - uses: actions/download-artifact@v4
        with:
          name: desktop-upgrade-result
          path: results
      - name: Aggregate Results & Generate Evidence (Fail Closed)
        env:
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          REPOSITORY: ${{ github.repository }}
          STAGING_URL: ${{ needs.deploy-staging.outputs.staging_url }}
          DEPLOYMENT_ID: ${{ needs.deploy-staging.outputs.deployment_id }}
          INSTALLER_HASH: ${{ needs.verify-desktop-candidate.outputs.installer_sha256 }}
          BLOCKMAP_HASH: ${{ needs.verify-desktop-candidate.outputs.blockmap_sha256 }}
          LATEST_HASH: ${{ needs.verify-desktop-candidate.outputs.latest_yml_sha256 }}
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
        run: node scripts/aggregate-staging-evidence.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: staging-evidence
          path: staging-evidence.json

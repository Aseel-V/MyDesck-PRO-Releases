
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f8fafc; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  
  <table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color: #f8fafc;">
    <tr>
      <td align="center" style="padding: 40px 20px;">
        
        <!-- Main Container -->
        <table width="100%" border="0" cellspacing="0" cellpadding="0" style="max-width: 600px; background-color: #ffffff; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);">
          
          <!-- Header -->
          <tr>
            <td align="center" style="padding: 32px 0; border-bottom: 1px solid #e2e8f0;">
              <h1 style="margin: 0; font-size: 24px; font-weight: 700; color: #0f172a;">
                MyDesck <span style="color: #0ea5e9;">PRO</span>
              </h1>
            </td>
          </tr>

          <!-- Content -->
          <tr>
            <td style="padding: 40px 32px; text-align: center;">
              
              <!-- Icon -->
              <div style="margin-bottom: 24px;">
                <img src="https://my-desck-pro.vercel.app/favicon.ico" alt="key" width="48" height="48" style="border-radius: 8px;">
              </div>

              <h2 style="margin: 0 0 16px; font-size: 20px; font-weight: 600; color: #1e293b;">
                Forgot your password?
              </h2>
              
              <p style="margin: 0 0 32px; font-size: 16px; line-height: 24px; color: #64748b;">
                That's okay, it happens! Click the button below to reset your password.
              </p>

              <!-- Action Button -->
              <!-- IMPORTANT: {{ .ConfirmationURL }} is the generic Supabase variable, but for reset password specifically it is {{ .ConfirmationURL }} or {{ .SiteURL }} logic. verification_url is typical for confirm email.
                   For Reset Password template in Supabase, uses {{ .ConfirmationURL }} usually maps to the redirect.
                   Actually, Supabase Reset Password template uses {{ .ConfirmationURL }} as the link. 
              -->
              <a href="{{ .ConfirmationURL }}" style="display: inline-block; padding: 14px 32px; background-color: #0ea5e9; color: #ffffff; text-decoration: none; font-weight: 600; font-size: 16px; border-radius: 8px; transition: background-color 0.2s;">
                Reset Password
              </a>

              <p style="margin: 32px 0 0; font-size: 14px; line-height: 22px; color: #94a3b8;">
                If you didn't request this, you can safely ignore this email.
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding: 24px 32px; background-color: #f1f5f9; border-bottom-left-radius: 16px; border-bottom-right-radius: 16px; text-align: center;">
              <p style="margin: 0; font-size: 12px; color: #64748b;">
                © 2026 MyDesck PRO. All rights reserved.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
